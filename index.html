<!DOCTYPE html>
<html>
  <head>
   <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;300;400&amp;family=Roboto:wght@300&amp;display=swap">
  <title>Backup Site - HKTSS</title>
  </head>
  <body>
  <!-- Redirection Counter -->
<script type="text/javascript">
  var count = 10; // Timer
  var redirect = "https://hktss.ml"; // Target URL

  function countDown() {
    var timer = document.getElementById("timer"); // Timer ID
    if (count > 0) {
      count--;
      timer.innerHTML = "You will be redirected to Main Site in " + count + " second(s)"; // Timer Message
      setTimeout("countDown()", 1000);
    } else {
      window.location.href = redirect;
    }
  }
</script>

<div id="master-wrap">
  <div id="logo-box">

    <div class="animated fast fadeInUp">
      <!-- div class="icon"></div -->
      <img src="tss.png" class="logo">
    </div>

    <div class="notice animated fadeInUp">
      <p class="lead">Welcome to HKTSS's Backup Site</p>
      <!--a class="btn animation" href="javascript:history.back()">&larr; Go to Main Site</a-->
    </div>

    <div class="footer animated slow fadeInUp">
      <p id="timer">
        <script type="text/javascript">
          countDown();
        </script>
      </p>
      <p class="copyright">&copy; Hong Kong Transport Simulation Studio <script>document.write(new Date().getFullYear())</script></p>
    </div>

  </div>
  <!-- /#logo-box -->
</div>
<!-- /#master-wrap -->
</body>
</html>
